<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700">
  <defs>
    <linearGradient id="body-face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#252540"/>
      <stop offset="35%" stop-color="#18182E"/>
      <stop offset="100%" stop-color="#0E0E1C"/>
    </linearGradient>
    <linearGradient id="body-side" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A0A14"/>
      <stop offset="100%" stop-color="#1A1A30"/>
    </linearGradient>
    <linearGradient id="strap-main" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E1E36"/>
      <stop offset="50%" stop-color="#141426"/>
      <stop offset="100%" stop-color="#1A1A30"/>
    </linearGradient>
    <linearGradient id="strap-sheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="top-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="led-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#2DD4BF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="led-glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sensor-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floor-shadow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="22" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="glow-led" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="chip-shadow" x="-15%" y="-20%" width="130%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <clipPath id="body-clip">
      <rect x="-230" y="-70" width="460" height="140" rx="24"/>
    </clipPath>
  </defs>

  <!-- Floor shadow -->
  <ellipse cx="400" cy="590" rx="195" ry="28" fill="url(#floor-shadow)"/>

  <!-- BAND GROUP — centered at 400,350 -->
  <g transform="translate(400,350)" filter="url(#drop)">

    <!-- Strap top -->
    <g transform="translate(0,-220)">
      <rect x="-34" y="-80" width="68" height="160" rx="16" fill="url(#strap-main)"/>
      <rect x="-34" y="-80" width="68" height="160" rx="16" fill="url(#strap-sheen)"/>
      <!-- strap texture lines -->
      <line x1="-22" y1="-65" x2="-22" y2="65" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.03"/>
      <line x1="-11" y1="-70" x2="-11" y2="70" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.025"/>
      <line x1="0"   y1="-72" x2="0"   y2="72" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.03"/>
      <line x1="11"  y1="-70" x2="11"  y2="70" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.025"/>
      <line x1="22"  y1="-65" x2="22"  y2="65" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.03"/>
      <!-- strap holes -->
      <circle cx="0" cy="-50" r="4.5" fill="#08080F" stroke="#0E0E1C" stroke-width="1"/>
      <circle cx="0" cy="-30" r="4.5" fill="#08080F" stroke="#0E0E1C" stroke-width="1"/>
      <circle cx="0" cy="-10" r="4.5" fill="#08080F" stroke="#0E0E1C" stroke-width="1"/>
      <circle cx="0" cy="10"  r="4.5" fill="#08080F" stroke="#0E0E1C" stroke-width="1"/>
      <!-- top edge highlight -->
      <rect x="-34" y="-80" width="68" height="4" rx="2" fill="white" fill-opacity="0.05"/>
    </g>

    <!-- Strap bottom -->
    <g transform="translate(0,220)">
      <rect x="-34" y="-90" width="68" height="160" rx="16" fill="url(#strap-main)"/>
      <rect x="-34" y="-90" width="68" height="160" rx="16" fill="url(#strap-sheen)"/>
      <line x1="-22" y1="-75" x2="-22" y2="55" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.03"/>
      <line x1="-11" y1="-80" x2="-11" y2="58" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.025"/>
      <line x1="0"   y1="-82" x2="0"   y2="60" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.03"/>
      <line x1="11"  y1="-80" x2="11"  y2="58" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.025"/>
      <line x1="22"  y1="-75" x2="22"  y2="55" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.03"/>
      <!-- clasp pin -->
      <rect x="-26" y="40" width="52" height="8" rx="4" fill="#0E0E1C" stroke="#1E1E36" stroke-width="0.5"/>
      <rect x="-3" y="36" width="6" height="16" rx="3" fill="#1C1C34"/>
    </g>

    <!-- Main body -->
    <rect x="-230" y="-70" width="460" height="140" rx="24" fill="url(#body-face)"/>

    <!-- Top shine -->
    <rect x="-230" y="-70" width="460" height="70" rx="24" fill="url(#top-shine)" clip-path="url(#body-clip)"/>

    <!-- Border / frame -->
    <rect x="-230" y="-70" width="460" height="140" rx="24" fill="none" stroke="#2DD4BF" stroke-width="0.8" stroke-opacity="0.22"/>

    <!-- Inner bevel line -->
    <rect x="-222" y="-62" width="444" height="124" rx="19" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.05"/>

    <!-- Left highlight edge -->
    <rect x="-230" y="-46" width="3" height="92" rx="1.5" fill="white" fill-opacity="0.06"/>

    <!-- Sensor display area (center panel) -->
    <rect x="-58" y="-38" width="116" height="76" rx="12" fill="#0A0A14" stroke="rgba(45,212,191,0.15)" stroke-width="0.8"/>

    <!-- LED glow halo -->
    <circle cx="0" cy="0" r="44" fill="url(#sensor-glow)" filter="url(#glow-led)"/>

    <!-- LEDs -->
    <circle cx="-20" cy="0" r="7" fill="url(#led-center)" filter="url(#glow-led)" opacity="0.7"/>
    <circle cx="0"   cy="0" r="8" fill="url(#led-center)" filter="url(#glow-led)"/>
    <circle cx="20"  cy="0" r="7" fill="url(#led-center)" filter="url(#glow-led)" opacity="0.55"/>

    <!-- LED halos -->
    <circle cx="-20" cy="0" r="22" fill="url(#led-glow1)" opacity="0.5"/>
    <circle cx="0"   cy="0" r="26" fill="url(#led-glow1)"/>
    <circle cx="20"  cy="0" r="22" fill="url(#led-glow1)" opacity="0.4"/>

    <!-- Brand text -->
    <text x="0" y="54" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9.5" font-weight="800" letter-spacing="0.28em" fill="#2DD4BF" fill-opacity="0.35">WOVO BAND</text>

    <!-- Side detail lines (right) -->
    <line x1="170" y1="-50" x2="170" y2="50" stroke="#2DD4BF" stroke-width="0.5" stroke-opacity="0.12"/>
    <line x1="195" y1="-42" x2="195" y2="42" stroke="#2DD4BF" stroke-width="0.5" stroke-opacity="0.08"/>

    <!-- Side detail lines (left) -->
    <line x1="-170" y1="-50" x2="-170" y2="50" stroke="#2DD4BF" stroke-width="0.5" stroke-opacity="0.12"/>
    <line x1="-195" y1="-42" x2="-195" y2="42" stroke="#2DD4BF" stroke-width="0.5" stroke-opacity="0.08"/>

    <!-- Surface micro texture -->
    <rect x="-228" y="-68" width="456" height="136" rx="23" fill="none"
      stroke="#ffffff" stroke-width="14" stroke-opacity="0.008"/>
  </g>

  <!-- Metric chip: HRV — right side -->
  <g transform="translate(625,270)" filter="url(#chip-shadow)">
    <rect width="148" height="52" rx="12" fill="#13132A" stroke="#2DD4BF" stroke-width="0.8" stroke-opacity="0.55"/>
    <rect width="148" height="52" rx="12" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.04"/>
    <circle cx="20" cy="26" r="5.5" fill="#2DD4BF"/>
    <text x="36" y="20" font-family="Inter,sans-serif" font-size="8.5" font-weight="700" fill="#2DD4BF" fill-opacity="0.75" letter-spacing="0.1em">HRV</text>
    <text x="36" y="38" font-family="Inter,sans-serif" font-size="17" font-weight="900" fill="#F0F0F8">58 ms</text>
  </g>

  <!-- Metric chip: SLEEP — right side lower -->
  <g transform="translate(638,338)" filter="url(#chip-shadow)">
    <rect width="148" height="52" rx="12" fill="#13132A" stroke="#818CF8" stroke-width="0.8" stroke-opacity="0.55"/>
    <circle cx="20" cy="26" r="5.5" fill="#818CF8"/>
    <text x="36" y="20" font-family="Inter,sans-serif" font-size="8.5" font-weight="700" fill="#818CF8" fill-opacity="0.75" letter-spacing="0.1em">SLEEP</text>
    <text x="36" y="38" font-family="Inter,sans-serif" font-size="17" font-weight="900" fill="#F0F0F8">88%</text>
  </g>

  <!-- Metric chip: HR — left side -->
  <g transform="translate(24,265)" filter="url(#chip-shadow)">
    <rect width="148" height="52" rx="12" fill="#13132A" stroke="#2DD4BF" stroke-width="0.8" stroke-opacity="0.55"/>
    <circle cx="20" cy="26" r="5.5" fill="#2DD4BF"/>
    <text x="36" y="20" font-family="Inter,sans-serif" font-size="8.5" font-weight="700" fill="#2DD4BF" fill-opacity="0.75" letter-spacing="0.1em">HEART RATE</text>
    <text x="36" y="38" font-family="Inter,sans-serif" font-size="17" font-weight="900" fill="#F0F0F8">64 bpm</text>
  </g>

  <!-- Metric chip: RECOVERY — left side lower -->
  <g transform="translate(10,333)" filter="url(#chip-shadow)">
    <rect width="148" height="52" rx="12" fill="#13132A" stroke="#818CF8" stroke-width="0.8" stroke-opacity="0.55"/>
    <circle cx="20" cy="26" r="5.5" fill="#818CF8"/>
    <text x="36" y="20" font-family="Inter,sans-serif" font-size="8.5" font-weight="700" fill="#818CF8" fill-opacity="0.75" letter-spacing="0.1em">RECOVERY</text>
    <text x="36" y="38" font-family="Inter,sans-serif" font-size="17" font-weight="900" fill="#F0F0F8">82%</text>
  </g>

  <!-- Connector dashes -->
  <line x1="172" y1="296" x2="265" y2="340" stroke="#2DD4BF" stroke-width="0.6" stroke-opacity="0.18" stroke-dasharray="3 5"/>
  <line x1="172" y1="364" x2="265" y2="362" stroke="#818CF8" stroke-width="0.6" stroke-opacity="0.18" stroke-dasharray="3 5"/>
  <line x1="628" y1="296" x2="535" y2="340" stroke="#2DD4BF" stroke-width="0.6" stroke-opacity="0.18" stroke-dasharray="3 5"/>
  <line x1="638" y1="364" x2="535" y2="358" stroke="#818CF8" stroke-width="0.6" stroke-opacity="0.18" stroke-dasharray="3 5"/>
</svg>
