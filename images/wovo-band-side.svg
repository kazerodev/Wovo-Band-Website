<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700">
  <defs>
    <linearGradient id="side-face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#252540"/>
      <stop offset="40%" stop-color="#18182E"/>
      <stop offset="100%" stop-color="#0E0E1C"/>
    </linearGradient>
    <linearGradient id="side-top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1C1C38"/>
      <stop offset="50%" stop-color="#2A2A48"/>
      <stop offset="100%" stop-color="#1C1C38"/>
    </linearGradient>
    <linearGradient id="side-btm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A0A16"/>
      <stop offset="50%" stop-color="#10101E"/>
      <stop offset="100%" stop-color="#0A0A16"/>
    </linearGradient>
    <linearGradient id="sistrap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141426"/>
      <stop offset="50%" stop-color="#1A1A30"/>
      <stop offset="100%" stop-color="#141426"/>
    </linearGradient>
    <linearGradient id="shine-l" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="edge-glow" cx="0%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fl-s" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="sidedrop" x="-25%" y="-20%" width="150%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="glow-edge" x="-100%" y="-50%" width="300%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="400" cy="600" rx="180" ry="24" fill="url(#fl-s)"/>

  <g transform="translate(400,340)" filter="url(#sidedrop)">
    <!-- Strap top -->
    <rect x="-28" y="-298" width="56" height="232" rx="15" fill="url(#sistrap)"/>
    <rect x="-28" y="-298" width="56" height="4" rx="2" fill="white" fill-opacity="0.05"/>
    <line x1="-16" y1="-280" x2="-16" y2="-80" stroke="white" stroke-width="0.5" stroke-opacity="0.04"/>
    <line x1="0"   y1="-285" x2="0"   y2="-78" stroke="white" stroke-width="0.5" stroke-opacity="0.04"/>
    <line x1="16"  y1="-280" x2="16"  y2="-80" stroke="white" stroke-width="0.5" stroke-opacity="0.04"/>
    <circle cx="0" cy="-250" r="4" fill="#07070E"/>
    <circle cx="0" cy="-226" r="4" fill="#07070E"/>
    <circle cx="0" cy="-202" r="4" fill="#07070E"/>
    <circle cx="0" cy="-178" r="4" fill="#07070E"/>

    <!-- Strap bottom -->
    <rect x="-28" y="70" width="56" height="220" rx="15" fill="url(#sistrap)"/>
    <line x1="-16" y1="82" x2="-16" y2="275" stroke="white" stroke-width="0.5" stroke-opacity="0.04"/>
    <line x1="0"   y1="80" x2="0"   y2="278" stroke="white" stroke-width="0.5" stroke-opacity="0.04"/>
    <line x1="16"  y1="82" x2="16"  y2="275" stroke="white" stroke-width="0.5" stroke-opacity="0.04"/>
    <!-- Clasp -->
    <rect x="-22" y="240" width="44" height="12" rx="6" fill="#09090F" stroke="#18182E" stroke-width="0.6"/>
    <rect x="-4" y="236" width="8" height="20" rx="4" fill="#141424"/>

    <!-- Band body — side profile (thin & tall) -->
    <!-- Back face -->
    <rect x="18" y="-68" width="26" height="138" rx="6" fill="url(#side-btm)"/>
    <!-- Front face (main visible) -->
    <rect x="-28" y="-68" width="56" height="138" rx="18" fill="url(#side-face)"/>
    <!-- Top edge (thin profile highlight) -->
    <rect x="-28" y="-68" width="56" height="10" rx="9" fill="url(#side-top)"/>
    <!-- Bottom edge -->
    <rect x="-28" y="58"  width="56" height="10" rx="5" fill="url(#side-btm)"/>
    <!-- Front face frame -->
    <rect x="-28" y="-68" width="56" height="138" rx="18" fill="none" stroke="#2DD4BF" stroke-width="0.8" stroke-opacity="0.2"/>
    <!-- Left edge highlight -->
    <rect x="-28" y="-50" width="3" height="100" rx="1.5" fill="url(#shine-l)"/>
    <!-- Right edge glow -->
    <rect x="22" y="-68" width="6" height="138" rx="3" fill="url(#edge-glow)" filter="url(#glow-edge)"/>
    <!-- LED indicator (front face) -->
    <circle cx="0" cy="0" r="5" fill="#2DD4BF" fill-opacity="0.8" filter="url(#glow-edge)"/>
    <circle cx="0" cy="0" r="10" fill="#2DD4BF" fill-opacity="0.12"/>
    <!-- Thickness annotation line -->
    <line x1="38" y1="-68" x2="38" y2="68" stroke="#2DD4BF" stroke-width="0.6" stroke-opacity="0.2" stroke-dasharray="2 4"/>
    <line x1="32" y1="-68" x2="44" y2="-68" stroke="#2DD4BF" stroke-width="0.6" stroke-opacity="0.3"/>
    <line x1="32" y1="68"  x2="44" y2="68"  stroke="#2DD4BF" stroke-width="0.6" stroke-opacity="0.3"/>
  </g>

  <!-- Annotation: Thickness -->
  <g transform="translate(478,290)">
    <rect width="118" height="50" rx="10" fill="#13132A" stroke="#2DD4BF" stroke-width="0.8" stroke-opacity="0.5"
      filter="drop-shadow(0 6px 14px rgba(0,0,0,0.5))"/>
    <text x="12" y="18" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#2DD4BF" fill-opacity="0.7" letter-spacing="0.08em">THICKNESS</text>
    <text x="12" y="36" font-family="Inter,sans-serif" font-size="18" font-weight="900" fill="#F0F0F8">12 mm</text>
  </g>

  <!-- Annotation: Weight -->
  <g transform="translate(196,395)">
    <rect width="118" height="50" rx="10" fill="#13132A" stroke="#818CF8" stroke-width="0.8" stroke-opacity="0.5"
      filter="drop-shadow(0 6px 14px rgba(0,0,0,0.5))"/>
    <text x="12" y="18" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#818CF8" fill-opacity="0.7" letter-spacing="0.08em">WEIGHT</text>
    <text x="12" y="36" font-family="Inter,sans-serif" font-size="18" font-weight="900" fill="#F0F0F8">28 g</text>
  </g>

  <!-- Annotation: IPX7 -->
  <g transform="translate(478,395)">
    <rect width="118" height="50" rx="10" fill="#13132A" stroke="#2DD4BF" stroke-width="0.8" stroke-opacity="0.5"
      filter="drop-shadow(0 6px 14px rgba(0,0,0,0.5))"/>
    <text x="12" y="18" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#2DD4BF" fill-opacity="0.7" letter-spacing="0.08em">WATERPROOF</text>
    <text x="12" y="36" font-family="Inter,sans-serif" font-size="18" font-weight="900" fill="#F0F0F8">IPX7</text>
  </g>
</svg>
