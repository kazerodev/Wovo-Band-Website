<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700">
  <defs>
    <linearGradient id="sb-face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1C38"/>
      <stop offset="50%" stop-color="#14142A"/>
      <stop offset="100%" stop-color="#0C0C1C"/>
    </linearGradient>
    <linearGradient id="sstrap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0E0E1E"/>
      <stop offset="50%" stop-color="#181830"/>
      <stop offset="100%" stop-color="#0E0E1E"/>
    </linearGradient>
    <radialGradient id="green-led" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="red-led" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ir-led" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sensor-pad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A1A32"/>
      <stop offset="100%" stop-color="#0E0E1E"/>
    </radialGradient>
    <filter id="sdrop" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="led-glow-g" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="led-glow-r" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="fl-sh" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shine-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <ellipse cx="400" cy="598" rx="185" ry="24" fill="url(#fl-sh)"/>

  <g transform="translate(400,340)" filter="url(#sdrop)">
    <!-- Strap left -->
    <g transform="translate(-258,0)">
      <rect x="-80" y="-32" width="98" height="64" rx="14" fill="url(#sstrap)"/>
      <rect x="-80" y="-32" width="98" height="4" rx="2" fill="white" fill-opacity="0.04"/>
      <line x1="-68" y1="-22" x2="6" y2="-22" stroke="white" stroke-width="0.4" stroke-opacity="0.04"/>
      <line x1="-68" y1="0"   x2="6" y2="0"   stroke="white" stroke-width="0.4" stroke-opacity="0.03"/>
      <line x1="-68" y1="22"  x2="6" y2="22"  stroke="white" stroke-width="0.4" stroke-opacity="0.04"/>
      <circle cx="-52" cy="-16" r="3.5" fill="#070710"/>
      <circle cx="-52" cy="0"   r="3.5" fill="#070710"/>
      <circle cx="-52" cy="16"  r="3.5" fill="#070710"/>
    </g>
    <!-- Strap right -->
    <g transform="translate(258,0)">
      <rect x="-18" y="-32" width="98" height="64" rx="14" fill="url(#sstrap)"/>
      <rect x="-18" y="-32" width="98" height="4" rx="2" fill="white" fill-opacity="0.04"/>
      <line x1="-6" y1="-22" x2="68" y2="-22" stroke="white" stroke-width="0.4" stroke-opacity="0.04"/>
      <line x1="-6" y1="0"   x2="68" y2="0"   stroke="white" stroke-width="0.4" stroke-opacity="0.03"/>
      <line x1="-6" y1="22"  x2="68" y2="22"  stroke="white" stroke-width="0.4" stroke-opacity="0.04"/>
      <!-- clasp -->
      <rect x="48" y="-7" width="24" height="14" rx="7" fill="#0A0A16" stroke="#1C1C34" stroke-width="0.6"/>
      <rect x="62" y="-4" width="10" height="8" rx="4" fill="#141428"/>
    </g>

    <!-- Main body (showing back/sensor side) -->
    <rect x="-220" y="-68" width="440" height="136" rx="22" fill="url(#sb-face)"/>
    <rect x="-220" y="-68" width="440" height="136" rx="22" fill="none" stroke="rgba(45,212,191,0.15)" stroke-width="0.8"/>
    <rect x="-218" y="-67" width="436" height="44" rx="20" fill="url(#shine-top)"/>
    <rect x="-220" y="-46" width="3" height="92" rx="1.5" fill="white" fill-opacity="0.05"/>

    <!-- Sensor housing — large oval indentation -->
    <ellipse cx="0" cy="0" rx="120" ry="54" fill="#0A0A16" stroke="rgba(45,212,191,0.12)" stroke-width="0.8"/>
    <ellipse cx="0" cy="0" rx="112" ry="48" fill="url(#sensor-pad)"/>

    <!-- Charging pins (right side of sensor) -->
    <rect x="88" y="-8" width="18" height="6" rx="3" fill="#2DD4BF" fill-opacity="0.35"/>
    <rect x="88" y="2"  width="18" height="6" rx="3" fill="#2DD4BF" fill-opacity="0.25"/>

    <!-- Green PPG LEDs (main sensors) — large -->
    <circle cx="-48" cy="0" r="20" fill="#0D0D1A"/>
    <circle cx="-48" cy="0" r="14" fill="url(#green-led)" filter="url(#led-glow-g)"/>
    <circle cx="-48" cy="0" r="22" fill="#22C55E" fill-opacity="0.12"/>

    <circle cx="48" cy="0" r="20" fill="#0D0D1A"/>
    <circle cx="48" cy="0" r="14" fill="url(#green-led)" filter="url(#led-glow-g)"/>
    <circle cx="48" cy="0" r="22" fill="#22C55E" fill-opacity="0.12"/>

    <!-- Red LED (SpO2) — center top -->
    <circle cx="0" cy="-22" r="12" fill="#0D0D1A"/>
    <circle cx="0" cy="-22" r="8"  fill="url(#red-led)" filter="url(#led-glow-r)"/>
    <circle cx="0" cy="-22" r="14" fill="#EF4444" fill-opacity="0.1"/>

    <!-- IR LED (SpO2) — center bottom -->
    <circle cx="0" cy="22" r="12" fill="#0D0D1A"/>
    <circle cx="0" cy="22" r="8"  fill="url(#ir-led)" filter="url(#led-glow-r)"/>
    <circle cx="0" cy="22" r="14" fill="#818CF8" fill-opacity="0.1"/>

    <!-- Sensor labels -->
    <text x="-48" y="40" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="700" fill="#22C55E" fill-opacity="0.5" letter-spacing="0.06em">PPG</text>
    <text x="48"  y="40" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="700" fill="#22C55E" fill-opacity="0.5" letter-spacing="0.06em">PPG</text>
    <text x="0" y="-30" text-anchor="middle" font-family="Inter,sans-serif" font-size="6.5" font-weight="700" fill="#EF4444" fill-opacity="0.45" letter-spacing="0.05em">SpO2</text>

    <!-- Brand bottom right -->
    <text x="180" y="54" text-anchor="end" font-family="Inter,sans-serif" font-size="8" font-weight="800" letter-spacing="0.22em" fill="#2DD4BF" fill-opacity="0.22">WOVO BAND</text>
  </g>

  <!-- Annotation chips -->
  <g transform="translate(570,225)" filter="drop-shadow(0 6px 14px rgba(0,0,0,0.5))">
    <rect width="158" height="52" rx="11" fill="#13132A" stroke="#22C55E" stroke-width="0.8" stroke-opacity="0.55"/>
    <circle cx="18" cy="26" r="5" fill="#22C55E"/>
    <text x="33" y="20" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#22C55E" fill-opacity="0.75" letter-spacing="0.1em">PPG SENSORS</text>
    <text x="33" y="37" font-family="Inter,sans-serif" font-size="13" font-weight="800" fill="#F0F0F8">HRV · HR · Sleep</text>
  </g>

  <g transform="translate(72,225)" filter="drop-shadow(0 6px 14px rgba(0,0,0,0.5))">
    <rect width="148" height="52" rx="11" fill="#13132A" stroke="#EF4444" stroke-width="0.8" stroke-opacity="0.55"/>
    <circle cx="18" cy="26" r="5" fill="#EF4444"/>
    <text x="33" y="20" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#EF4444" fill-opacity="0.75" letter-spacing="0.1em">SpO2 SENSOR</text>
    <text x="33" y="37" font-family="Inter,sans-serif" font-size="13" font-weight="800" fill="#F0F0F8">Blood Oxygen</text>
  </g>

  <g transform="translate(310,530)" filter="drop-shadow(0 6px 14px rgba(0,0,0,0.5))">
    <rect width="178" height="52" rx="11" fill="#13132A" stroke="#818CF8" stroke-width="0.8" stroke-opacity="0.55"/>
    <circle cx="18" cy="26" r="5" fill="#818CF8"/>
    <text x="33" y="20" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#818CF8" fill-opacity="0.75" letter-spacing="0.1em">INFRARED</text>
    <text x="33" y="37" font-family="Inter,sans-serif" font-size="13" font-weight="800" fill="#F0F0F8">Deep Sleep Analysis</text>
  </g>
</svg>
